# ... (ด้านบนคงเดิมจนถึงขั้นตอนรัน Frontend Build)

    - name: Prepare Database Schema
      run: cd backend && npx prisma db push
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test

    - name: Start Backend Server
      run: |
        cd backend
        npm run build
        npm start & 
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test
        PORT: 3001

    - name: Wait for API to be ready
      run: npx wait-on http://localhost:3001 --timeout 60000

    - name: Run Newman API Tests
      run: |
        npm install -g newman
        newman run tests/postman/RMS-68030298-TestSuite-v2.json \
        -e tests/postman/env-ci.json \
        --reporters cli
      # แนะนำให้เอา || true ออก เพื่อให้มันแดงจริงๆ ถ้าเทสไม่ผ่าน