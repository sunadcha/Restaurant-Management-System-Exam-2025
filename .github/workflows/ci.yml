- name: Install dependencies
      run: npm install  # ติดตั้ง Library ที่จำเป็นรวมถึง wait-on (ถ้ามีใน package.json)

    - name: Start Backend Server
      # รัน Server เป็น background process
      run: npm start & 

    - name: Wait for Server to be ready
      # สำคัญมาก: รอจนกว่า port 3001 จะตอบรับจริง ๆ ถึงจะเริ่มเทส
      run: npx wait-on http://localhost:3001 --timeout 60000

    - name: Run Newman API Tests
      # ลบ continue-on-error ออกแล้ว
      run: |
        newman run tests/postman/RMS-68030298-TestSuite-v2.json \
        -e tests/postman/env-ci.json \
        --reporters cli