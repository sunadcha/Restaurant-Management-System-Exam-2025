name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd backend && npm ci
        cd ../frontend && npm ci

    - name: Generate Prisma client
      run: cd backend && npx prisma generate

    - name: Run backend tests
      continue-on-error: true
      run: cd backend && npm test
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test

    - name: Run frontend build
      run: cd frontend && npm run build

    - name: Start Backend Server
      run: |
        cd backend
        npm start &
        npx wait-on http://localhost:3001 --timeout 60000
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test
        PORT: 3001

    - name: Run Newman API Tests
      run: |
        npx newman run tests/postman/RMS-68030298-TestSuite-v2.json \
        -e tests/postman/env-ci.json \
        --reporters cli